# Canonical agent-tools baseline — single source of truth for shared tool versions.
#
# This file is vendored into each consumer repo as:
#   .config/mise/conf.d/00-agent-baseline.toml
#
# Repos consuming this baseline (Phase 1+): agents (source), jack, alex, henry
# Repos NOT consuming this baseline: ai-mktpl (manages its own versions)
#
# To override a baseline tool in a consumer repo, re-declare it in that repo's
# mise.toml — it takes precedence over conf.d entries (higher in the load order).
#
# To update the baseline: edit this file, run `mise run sync-mise-baseline` in
# each consumer repo, commit the updated .config/mise/conf.d/00-agent-baseline.toml.

[tools]
node = "24.15.0"
# claude-code's native binary is installed by a node postinstall script:
# `depends = "node"` ensures node installs first, else the binary is missing
# ("claude native binary not installed", which fails `claude plugin validate`).
# Pinned to 2.1.143 — 2.1.146 ships a broken native-binary install regardless.
"npm:@anthropic-ai/claude-code" = { version = "2.1.143", depends = "node" }
bun = "1.3.14"
jq = "1.8.1"
gh = "2.92.0"
yq = "4.53.2"
"npm:prettier" = "latest"
"npm:eslint" = "latest"
"github:nsheaps/op-exec" = "0.1.0"
"github:nsheaps/claude-utils" = "0.12.14"
