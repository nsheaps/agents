[plugins]
# postgres = "https://github.com/mise-plugins/vfox-postgres.git"

[tools]
jq = "1.8.1"
bun = "1.3.13"
node = "24.15.0"
# claude-code's native binary is installed by a node postinstall script:
# `depends = "node"` ensures node installs first, else the binary is missing
# ("claude native binary not installed", which fails `claude plugin validate`).
# Pinned to 2.1.128 to match alex/jack/henry mise.toml (and the patcher).
# Avoid 2.1.146+ which ships a broken native-binary install regardless.
"npm:@anthropic-ai/claude-code" = { version = "2.1.128", depends = "node" }
"pipx:litellm" = { version = "1.83.14", extras = "proxy" }
tilt = "0.37.3"

# nx is installed via bun (root devDependency). Every task below is a pure
# `bunx nx run-many --target=<name>` invocation — no inline prettier, no
# inline shell-syntax check. The root project (registered via the `nx`
# block in package.json) owns repo-level concerns (root markdown,
# bin/ shell-syntax) and excludes workspace dirs via .prettierignore-root,
# so nx can parallelize root + per-package targets with no overlap.
# See docs/MONOREPO.md for the full pattern.

[tasks.format]
description = "Format every project via nx (root + each workspace package)"
run = "bunx nx run-many --target=format"

[tasks.format-check]
description = "Check formatting for every project via nx"
run = "bunx nx run-many --target=format-check"

[tasks.lint]
description = "Lint every project via nx (root project runs prettier --check + shell-syntax sweep; workspace packages run prettier --check + tsc --noEmit)"
run = "bunx nx run-many --target=lint"

[tasks.lint-check]
description = "Lint-check (no auto-fix) every project via nx — read-only CI gate"
run = "bunx nx run-many --target=lint-check"

[tasks.build]
description = "Build every workspace package via nx (root has no build target and is skipped)"
run = "bunx nx run-many --target=build"

[tasks.test]
description = "Test every workspace package via nx (root has no test target and is skipped)"
run = "bunx nx run-many --target=test"

[tasks.check]
description = "Lint + build + test, every project via nx run-many in one pass (parallel, cached)"
run = "bunx nx run-many --target=lint --target=build --target=test"
