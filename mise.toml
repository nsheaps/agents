[plugins]
# postgres = "https://github.com/mise-plugins/vfox-postgres.git"

[tools]
# Shared baseline tools (node, bun, claude-code, jq, gh, yq, prettier, eslint,
# op-exec, claude-utils) are declared in:
#   .config/mise/conf.d/00-agent-baseline.toml
# Managed by packages/agent-tools-baseline — run `mise run sync-mise-baseline`
# after updating the canonical fragment. Override any baseline tool here if needed.
"pipx:litellm" = { version = "1.83.14", extras = "proxy" }
tilt = "0.37.3"

[tasks.format]
description = "Format markdown files with prettier"
# todo: this needs to come from mise, not bun
run = "bun run prettier --write '**/*.md'"

[tasks.format-check]
description = "Check markdown formatting with prettier"
run = "bun run prettier --check '**/*.md'"

[tasks.lint]
description = "Auto-fix lint issues (prettier --write) + shell syntax check"
depends = ["format"]
run = """
# Shell script syntax check (skip non-shell files: .ts, .js, .py, .rb, .go)
for script in bin/*; do
  [ -d "$script" ] && continue
  [ -f "$script" ] || continue
  case "$script" in
    *.ts|*.js|*.py|*.rb|*.go) continue ;;
  esac
  echo "Checking $script..."
  bash -n "$script"
done
for lib in bin/lib/*.sh; do
  [ -f "$lib" ] || continue
  echo "Checking $lib..."
  bash -n "$lib"
done
echo "All lint checks passed."
"""

[tasks.lint-check]
description = "Check-only linting (no auto-fix) — for read-only CI gates"
depends = ["format-check"]
run = """
# Shell script syntax check (skip non-shell files: .ts, .js, .py, .rb, .go)
for script in bin/*; do
  [ -d "$script" ] && continue
  [ -f "$script" ] || continue
  case "$script" in
    *.ts|*.js|*.py|*.rb|*.go) continue ;;
  esac
  echo "Checking $script..."
  bash -n "$script"
done
for lib in bin/lib/*.sh; do
  [ -f "$lib" ] || continue
  echo "Checking $lib..."
  bash -n "$lib"
done
echo "All lint checks passed."
"""

[tasks.build-task-mcp]
description = "Compile the task-utils MCP server native binary (mcp/dist/task-mcp) — local-dev/CI check; end users build on-device via mcp/build.sh"
dir = "plugins/claude-code/task-utils/mcp"
run = """
bun install
bun build --compile --outfile dist/task-mcp src/server.ts
echo "Built plugins/claude-code/task-utils/mcp/dist/task-mcp"
"""

[tasks.test-task-mcp]
description = "Run the task-utils MCP server unit + integration tests + hook write-gate test"
depends = ["build-task-mcp"]
run = """
cd plugins/claude-code/task-utils/mcp && bun test
cd "$MISE_PROJECT_ROOT" && bash plugins/claude-code/task-utils/mcp/test/hook-integration.test.sh
"""

[tasks.test]
description = "Run tests"
depends = ["test-task-mcp"]
run = "echo 'All tests passed'"

[tasks.check]
description = "Run all checks (format + lint + test)"
depends = ["lint", "test"]
run = "echo 'All checks passed'"
