[plugins]
# postgres = "https://github.com/mise-plugins/vfox-postgres.git"

[tools]
jq = "1.8.1"
bun = "1.3.14"
node = "24.16.0"
# claude-code's native binary is installed by a node postinstall script:
# `depends = "node"` ensures node installs first, else the binary is missing
# ("claude native binary not installed", which fails `claude plugin validate`).
# Pinned to 2.1.128 to match alex/jack/henry mise.toml (and the patcher).
# Avoid 2.1.146+ which ships a broken native-binary install regardless.
"npm:@anthropic-ai/claude-code" = { version = "2.1.143", depends = "node" }
"pipx:litellm" = { version = "1.84.0", extras = "proxy" }
tilt = "0.37.3"

# nx is installed via bun (root devDependency). Every fan-out task below is
# a pure `bunx nx run-many --target=<name>` invocation — no inline prettier,
# no inline shell-syntax check, no `bun run` fallbacks. The root project
# (registered via the `nx` block in package.json) owns repo-level concerns;
# workspace packages own their own. `.prettierignore-root` keeps the root
# target from touching files the workspace targets handle.
#
# format vs lint semantics:
#   lint   — run ALL checks read-only (prettier --check + tsc --noEmit +
#            shell-syntax + …). Never writes. Safe for CI gates.
#   format — run all auto-fixers (prettier --write, etc.), THEN run the same
#            check suite as lint. So `format` can write files AND still
#            fail when a non-fixable check (tsc, plugin validate, etc.)
#            fails. The autofix CI workflow uses `mise run format` and
#            commits any writes; the validate gate uses `mise run lint`.
# See docs/MONOREPO.md for the full pattern.

[tasks.format]
description = "Auto-fix every project via nx (root + each workspace package), then re-verify with the same checks lint runs"
run = "bunx nx run-many --target=format"

[tasks.lint]
description = "Read-only lint every project via nx (no writes)"
run = "bunx nx run-many --target=lint"

[tasks.build]
description = "Build every workspace package via nx (root and the plugins package have no build target and are skipped)"
run = "bunx nx run-many --target=build"

[tasks.test]
description = "Test every workspace package via nx (TS packages: bun test; @nsheaps/agents-plugins: claude plugin validate)"
run = "bunx nx run-many --target=test"

[tasks.check]
description = "Lint + build + test, every project via nx run-many in one pass (parallel, cached)"
run = "bunx nx run-many --target=lint --target=build --target=test"
