[tools]
bun = "latest"
"ubi:mikefarah/yq" = "latest"

# Dev lifecycle — tilt wrapper
[tasks."dev:up"]
description = "Start tilt in background"
run = "scripts/dev.sh up"

[tasks."dev:start"]
description = "Start tilt in foreground with streaming"
run = "scripts/dev.sh start"

[tasks."dev:stop"]
description = "Stop tilt"
run = "scripts/dev.sh stop"

# Agent management
[tasks."agent:enable"]
description = "Enable an agent in agents.yaml"
run = "scripts/agent-toggle.sh enable {{arg(name='agent')}}"

[tasks."agent:disable"]
description = "Disable an agent in agents.yaml"
run = "scripts/agent-toggle.sh disable {{arg(name='agent')}}"

[tasks.format]
description = "Format markdown files with prettier"
run = "bun run prettier --write '**/*.md'"

[tasks.format-check]
description = "Check markdown formatting with prettier"
run = "bun run prettier --check '**/*.md'"

[tasks.lint]
description = "Run all linting checks"
depends = ["format-check"]
run = """
# Shell script syntax check
for script in bin/*; do
  [ -d "$script" ] && continue
  [ -f "$script" ] || continue
  echo "Checking $script..."
  bash -n "$script"
done
for lib in bin/lib/*.sh; do
  [ -f "$lib" ] || continue
  echo "Checking $lib..."
  bash -n "$lib"
done
for script in scripts/*.sh; do
  [ -f "$script" ] || continue
  echo "Checking $script..."
  bash -n "$script"
done
echo "All lint checks passed."
"""

[tasks.test]
description = "Run tests"
run = "bun test"

[tasks.check]
description = "Run all checks (format + lint + test)"
depends = ["lint", "test"]
run = "echo 'All checks passed'"
