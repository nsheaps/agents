[plugins]
# postgres = "https://github.com/mise-plugins/vfox-postgres.git"

[tools]
jq = "1.8.1"
bun = "1.3.13"
node = "24.15.0"
# claude-code's native binary is installed by a node postinstall script:
# `depends = "node"` ensures node installs first, else the binary is missing
# ("claude native binary not installed", which fails `claude plugin validate`).
# Pinned to 2.1.128 to match alex/jack/henry mise.toml (and the patcher).
# Avoid 2.1.146+ which ships a broken native-binary install regardless.
"npm:@anthropic-ai/claude-code" = { version = "2.1.128", depends = "node" }
"pipx:litellm" = { version = "1.83.14", extras = "proxy" }
tilt = "0.37.3"

# nx is installed via bun (root devDependency). Invoke as `bunx nx`.
# See docs/MONOREPO.md for the full pattern.

[tasks.format]
description = "Format all files (root markdown + each workspace package via nx)"
run = """
bun run format
bunx nx run-many --target=format
"""

[tasks.format-check]
description = "Check formatting (root markdown + each workspace package via nx)"
run = """
bun run format-check
bunx nx run-many --target=format-check
"""

[tasks.lint]
description = "Lint all packages via nx, plus shell-script syntax check"
depends = ["format"]
run = """
bunx nx run-many --target=lint
for script in bin/*; do
  [ -d "$script" ] && continue
  [ -f "$script" ] || continue
  case "$script" in
    *.ts|*.js|*.py|*.rb|*.go) continue ;;
  esac
  echo "Checking $script..."
  bash -n "$script"
done
for lib in bin/lib/*.sh; do
  [ -f "$lib" ] || continue
  echo "Checking $lib..."
  bash -n "$lib"
done
echo "All lint checks passed."
"""

[tasks.lint-check]
description = "Check-only linting (no auto-fix) — for read-only CI gates"
depends = ["format-check"]
run = """
bunx nx run-many --target=lint
for script in bin/*; do
  [ -d "$script" ] && continue
  [ -f "$script" ] || continue
  case "$script" in
    *.ts|*.js|*.py|*.rb|*.go) continue ;;
  esac
  echo "Checking $script..."
  bash -n "$script"
done
for lib in bin/lib/*.sh; do
  [ -f "$lib" ] || continue
  echo "Checking $lib..."
  bash -n "$lib"
done
echo "All lint checks passed."
"""

[tasks.build]
description = "Build all workspace packages via nx"
run = "bunx nx run-many --target=build"

[tasks.test]
description = "Run tests across all workspace packages via nx"
run = "bunx nx run-many --target=test"

[tasks.check]
description = "Run all checks (format + lint + build + test)"
depends = ["lint", "build", "test"]
run = "echo 'All checks passed'"
