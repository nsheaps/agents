[tools]
bun = "latest"

[tasks.fmt]
description = "Format markdown files with prettier"
run = "bun run prettier --write '**/*.md'"

[tasks.fmt-check]
description = "Check markdown formatting with prettier"
run = "bun run prettier --check '**/*.md'"

[tasks.lint]
description = "Run all linting checks"
depends = ["fmt-check"]
run = "echo 'All lint checks passed'"

[tasks.test]
description = "Run tests"
run = "bun test"
