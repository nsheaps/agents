[plugins]
# postgres = "https://github.com/mise-plugins/vfox-postgres.git"

[tools]
jq = "1.8.1"
bun = "1.3.13"
node = "24.15.0"
# claude-code's native binary is installed by a node postinstall script:
# `depends = "node"` ensures node installs first, else the binary is missing
# ("claude native binary not installed", which fails `claude plugin validate`).
# Pinned to 2.1.143 — 2.1.146 ships a broken native-binary install regardless.
"npm:@anthropic-ai/claude-code" = { version = "2.1.143", depends = "node" }
"pipx:litellm" = { version = "1.83.14", extras = "proxy" }
tilt = "0.37.3"

# TODO Add nx? or install nx through bun? + migrate mise tasks to scripts in folder + scripts should delegate to nx in this repo

[tasks.format]
description = "Format markdown files with prettier"
# todo: this needs to come from mise, not bun
run = "bun run prettier --write '**/*.md'"

[tasks.format-check]
description = "Check markdown formatting with prettier"
run = "bun run prettier --check '**/*.md'"

[tasks.lint]
description = "Auto-fix lint issues (prettier --write) + shell syntax check"
depends = ["format"]
run = """
# Shell script syntax check (skip non-shell files: .ts, .js, .py, .rb, .go)
for script in bin/*; do
  [ -d "$script" ] && continue
  [ -f "$script" ] || continue
  case "$script" in
    *.ts|*.js|*.py|*.rb|*.go) continue ;;
  esac
  echo "Checking $script..."
  bash -n "$script"
done
for lib in bin/lib/*.sh; do
  [ -f "$lib" ] || continue
  echo "Checking $lib..."
  bash -n "$lib"
done
echo "All lint checks passed."
"""

[tasks.lint-check]
description = "Check-only linting (no auto-fix) — for read-only CI gates"
depends = ["format-check"]
run = """
# Shell script syntax check (skip non-shell files: .ts, .js, .py, .rb, .go)
for script in bin/*; do
  [ -d "$script" ] && continue
  [ -f "$script" ] || continue
  case "$script" in
    *.ts|*.js|*.py|*.rb|*.go) continue ;;
  esac
  echo "Checking $script..."
  bash -n "$script"
done
for lib in bin/lib/*.sh; do
  [ -f "$lib" ] || continue
  echo "Checking $lib..."
  bash -n "$lib"
done
echo "All lint checks passed."
"""

[tasks.test]
description = "Run tests"
run = "bun test"

[tasks.check]
description = "Run all checks (format + lint + test)"
depends = ["lint", "test"]
run = "echo 'All checks passed'"
