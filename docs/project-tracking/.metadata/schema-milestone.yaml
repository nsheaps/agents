# JSON Schema for milestone frontmatter — `docs/project-tracking/milestones/*.md`.
# Eventually validated programmatically by ticket-utils / project-utils.
# Until then, ticket-updater agents enforce by convention.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/nsheaps/agents/blob/main/docs/project-tracking/.metadata/schema-milestone.yaml"
title: Milestone
description: Frontmatter for a milestone object. The body of the .md file contains the original MASTER.md header content + per-bullet sub-items (with their I-IDs/GSD-IDs).
type: object
required:
  - type
  - id
  - name
  - state
  - created
  - source
  - events
properties:
  type:
    const: milestone
  id:
    type: string
    description: Canonical milestone identifier (e.g. M1, M2, ...). Format = `M<sequence>` (Linear-style, global namespace since milestones may span projects per intake/initialize.md). Replaces the legacy I-IDs from MASTER.md.
    pattern: "^M[0-9]+$"
  legacy_ids:
    type: array
    description: Old MASTER.md identifiers (e.g. I42) that mapped to this milestone. Preserves searchability.
    items:
      type: string
  name:
    type: string
    description: Human-readable milestone name (typically the MASTER.md header text).
  state:
    enum: [open, in-progress, complete]
    description: Lifecycle state. Milestones do NOT move folders by state — this field is the source of truth.
  created:
    type: string
    format: date-time
    description: ISO 8601 timestamp.
  completed:
    type: string
    format: date-time
    description: ISO 8601 timestamp. Required only when state=complete.
  source:
    type: string
    description: Relative link back to the MASTER.md anchor (e.g. `../MASTER.md#I42`).
  test_plan:
    type: string
    description: Relative link to the milestone test-plan file (e.g. `./$id.test-plan.md`). Absent until the milestone is fleshed out.
  results:
    type: array
    description: Relative links to validation result files (one per attempt).
    items:
      type: string
  tickets:
    type: array
    description: Relative links to project tickets contributing to this milestone (e.g. `../projects/GSD/<ticket>.md`).
    items:
      type: string
  events:
    type: array
    description: Chronological audit log. Append-only.
    items:
      type: object
      required: [ts, by, change]
      properties:
        ts:
          type: string
          format: date-time
        by:
          type: string
          description: Agent or contact responsible.
        change:
          type: string
          description: Short human description of what changed.
additionalProperties: false
allOf:
  - if:
      properties:
        state:
          const: complete
    then:
      required: [completed]
