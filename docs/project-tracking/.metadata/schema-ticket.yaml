# JSON Schema for ticket frontmatter — `docs/project-tracking/projects/<P>/tickets/*.md`.
# Eventually validated programmatically by ticket-utils / project-utils.
# Until then, ticket-updater agents enforce by convention.
#
# State is in the `state:` frontmatter field — tickets do NOT move folders
# by state (differs from earlier convention; see CLAUDE.md notes). Tickets live
# at `projects/<P>/tickets/<id>-<slug>.md` so non-ticket project artifacts can
# sit at `projects/<P>/` without mixing.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/nsheaps/agents/blob/main/docs/project-tracking/.metadata/schema-ticket.yaml"
title: Ticket
description: Frontmatter for a project ticket. Body contains the goal, original ask, requirements, acceptance criteria, and any triage notes added through the lifecycle.
type: object
required:
  - type
  - id
  - state
  - created
  - project
  - events
properties:
  type:
    enum: [bug, feature, milestone-request, feedback, chore]
  id:
    type: string
    description: Canonical ticket identifier (e.g. GSD-1). Format = `<PROJECT_ID>-<sequence>`.
    pattern: "^[A-Z][A-Z0-9_]*-[0-9]+$"
  legacy_ids:
    type: array
    description: Old identifiers (e.g. epoch IDs from the inbox phase, or I-IDs from MASTER.md). Preserves searchability.
    items:
      type: string
  aliases:
    type: array
    description: |
      Human-readable previous names/IDs that should also return this ticket when searched.
      Add when: ticket moves projects (old project's ID), legacy MASTER.md IDs (I7, I32, C1),
      FXP phase tags (FXP/1.8, FXP/SU.3), or any human-memorable name superseded by the canonical id.
      Most-recent name first, oldest last. Complements `legacy_ids` (which captures raw numeric
      epoch IDs for system traceability) — `aliases` captures human-readable old names for discoverability.
      Required by ticket-first discipline: see project-tracking-workflow skill.
    items:
      type: string
  state:
    enum: [triage, in-progress, done, will-not-do]
    description: Lifecycle state. Source of truth — tickets live at `projects/<P>/tickets/$id-$slug.md` regardless of state. Was previously a folder; folder convention dropped 2026-05-25 per Nate Discord 1508572570239242382.
  created:
    type: string
    format: date-time
  project:
    type: string
    description: Project identifier (e.g. GSD). Matches the folder under projects/.
  priority:
    type: integer
    minimum: 0
    maximum: 5
    default: 4
    description: |
      Integer priority 0-5. 0 = critical / do now, 5 = maybe later.
      Default is 4. P0 tickets are triaged first when the queue has multiple
      candidates; triage docs must surface this field.
  assignee:
    type: string
    description: contacts:// URL for the responsible agent/human.
  requester:
    type: string
    description: contacts:// URL for who asked for the work.
  references:
    type: array
    description: |
      External resources (PRs, issues, Discord messages, docs, agent tasks). Each gets a footnote-ref in the body.
      REQUIRED ENTRY: every ticket MUST include an entry of type `alex-task` (or `jack-task`/`henry-task`)
      pointing back to the originating agent task that triggered this ticket's creation.
      If no originating task exists, that is "bad job — created without ticket-first discipline."
      File the missing task retroactively before filing the ticket, then reference it here.
      Format for originating task reference:
        - id: originating-task
          type: alex-task
          id: "#NNN"
          url: "https://github.com/nsheaps/.ai-agent-alex/issues/20#task-NNN"
      Source: Nate Discord 2026-05-28 19:50Z (msg 1509645015234908415).
    items:
      type: object
      required: [id, type, url]
      properties:
        id:
          type: string
          description: Footnote-ref id used in body (`[^id]`).
        type:
          enum: [discord-message, telegram-message, github-pr, github-issue, github-commit, doc, ticket, url, alex-task, jack-task, henry-task]
        url:
          type: string
  milestone:
    type: string
    description: Relative link to the milestone object this ticket contributes to (e.g. `../../milestones/GSD-26.md`).
  events:
    type: array
    description: Chronological audit log. Append-only.
    items:
      type: object
      required: [ts, by, change]
      properties:
        ts:
          type: string
          format: date-time
        by:
          type: string
        change:
          type: string
additionalProperties: false
allOf:
  - if:
      properties:
        state:
          const: done
    then:
      required: [completed]
      properties:
        completed:
          type: string
          format: date-time
