name: Review Receiver (reusable)

# Reusable receiver workflow invoked from a target agent repo's
# `dispatch-receiver-review.yaml` after a repository_dispatch from the
# review-dispatch decider workflow.
#
# Executes the review under the TARGET AGENT'S identity (this workflow runs
# in the target's repo's CI), but updates check-runs on the CONSUMER repo
# via the same review App token.
#
# Spec: plugins/claude-code/review-utils/specs/review-dispatch.md
#       §Receiver-side-flow + §Final-CI-side-check-update
#
# Flow:
#   1. Generate review App token (used to call back into consumer repo).
#   2. Update the consumer-side check-run (created by decider) to in_progress
#      "Review agent running...".
#   3. Dismiss prior APPROVED reviews from this bot on the PR.
#   4. Checkout the plugin contents (nsheaps/agents@plugin-ref).
#   5. Invoke the plugin's `run-agent` composite action.
#   6. Read metrics yaml/json file emitted by the agent; fail if absent.
#   7. Update the consumer-side check to terminal state (success/neutral/failure)
#      based on agent verdict + follow-up count.
#   8. `if: failure()` final guard: post "review agent failed to run" check.

on:
  workflow_call:
    inputs:
      source-repo:
        description: 'Consumer repo where the PR + check_run live (owner/name).'
        required: true
        type: string
      source-pr-number:
        description: 'PR number on the consumer repo.'
        required: true
        type: number
      source-head-sha:
        description: 'Head SHA of the consumer PR.'
        required: true
        type: string
      source-head-ref:
        description: 'Head ref (branch) of the consumer PR.'
        required: true
        type: string
      source-base-ref:
        description: 'Base ref of the consumer PR.'
        required: true
        type: string
      check-run-id:
        description: 'Check-run id created by the decider on the consumer head SHA. The receiver updates this id rather than creating a new one.'
        required: true
        type: string
      consumer-workflow-run-url:
        description: 'URL to the consumer-side decider workflow run (for cross-linking).'
        required: false
        default: ''
        type: string
      plugin-ref:
        description: 'Git ref of nsheaps/agents to check out for the plugin contents. Default: main.'
        required: false
        default: 'main'
        type: string
    secrets:
      REVIEW_GITHUB_APP_ID:
        required: true
      REVIEW_GITHUB_APP_PRIVATE_KEY:
        required: true
      REVIEW_ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    concurrency:
      group: review-receiver-${{ inputs.source-repo }}-${{ inputs.source-pr-number }}
      cancel-in-progress: false

    steps:
      - name: Build details_url
        id: ctx
        run: |
          echo "details_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      # Compute consumer-repo owner/name from source-repo input. The App
      # token needs the consumer owner so checks/reviews can be posted back.
      - name: Parse consumer owner
        id: consumer
        run: |
          owner="${{ inputs.source-repo }}"
          owner="${owner%%/*}"
          name="${{ inputs.source-repo }}"
          name="${name#*/}"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Generate review App token
        id: auth
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEW_GITHUB_APP_ID }}
          private-key: ${{ secrets.REVIEW_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ steps.consumer.outputs.owner }}

      # Update check-run on consumer to in_progress.
      - name: Update check (in_progress)
        uses: LouisBrunner/checks-action@v3.1.0
        with:
          token: ${{ steps.auth.outputs.token }}
          repo: ${{ inputs.source-repo }}
          check_id: ${{ inputs.check-run-id }}
          status: in_progress
          details_url: ${{ steps.ctx.outputs.details_url }}
          output: |
            {"title":"Review agent running...","summary":"Reviewing on ${{ github.repository }} runners."}

      # Dismiss prior APPROVED reviews from this bot so the PR can't merge on
      # a stale approval. Keep REQUEST_CHANGES + COMMENT reviews intact.
      - name: Dismiss prior approval reviews
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          SOURCE_REPO: ${{ inputs.source-repo }}
          PR_NUMBER: ${{ inputs.source-pr-number }}
        run: |
          set -euo pipefail
          # Find approval reviews by this App's bot account.
          bot_login=$(gh api user --jq '.login')
          reviews_json=$(gh api "repos/${SOURCE_REPO}/pulls/${PR_NUMBER}/reviews?per_page=100")
          approval_ids=$(echo "$reviews_json" | jq -r --arg login "$bot_login" \
            '.[] | select(.user.login == $login and .state == "APPROVED") | .id')
          for rid in $approval_ids; do
            echo "Dismissing approval review $rid"
            gh api -X PUT "repos/${SOURCE_REPO}/pulls/${PR_NUMBER}/reviews/${rid}/dismissals" \
              -f message='Dismissed: new commits since last approval require re-review.' \
              -f event='DISMISS' || true
          done

      # Checkout the plugin contents from nsheaps/agents@plugin-ref so we can
      # invoke its composite action.
      - name: Checkout plugin (nsheaps/agents)
        uses: actions/checkout@v6
        with:
          repository: nsheaps/agents
          ref: ${{ inputs.plugin-ref }}
          path: agent-repo

      # Invoke the plugin's run-agent composite. It owns the actual review:
      # auth, checkout consumer repo, claude-code-action with plugins, finalize.
      # The composite's internal check-run creation duplicates ours; TODO
      # (#356) make run-agent accept a check-run-id and skip internal creation.
      - name: Run review agent
        id: agent
        uses: ./agent-repo/plugins/claude-code/review-utils/actions/run-agent
        with:
          trigger: |
            {
              "referer": "${{ github.repository }}/${{ github.workflow_ref }}",
              "source": {
                "repo": "${{ inputs.source-repo }}",
                "pr_number": ${{ inputs.source-pr-number }},
                "head_sha": "${{ inputs.source-head-sha }}",
                "head_ref": "${{ inputs.source-head-ref }}",
                "base_ref": "${{ inputs.source-base-ref }}"
              },
              "check_run_id": "${{ inputs.check-run-id }}",
              "consumer_workflow_run_url": "${{ inputs.consumer-workflow-run-url }}"
            }
          trigger-repo: ${{ inputs.source-repo }}
          trigger-ref: ${{ inputs.source-head-sha }}
          event-name: pull_request/synchronize
          app-id: ${{ secrets.REVIEW_GITHUB_APP_ID }}
          private-key: ${{ secrets.REVIEW_GITHUB_APP_PRIVATE_KEY }}
          anthropic-api-key: ${{ secrets.REVIEW_ANTHROPIC_API_KEY }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      # Read the metrics file the agent must emit. Spec §Receiver-side-flow
      # bullet 6: stop is rejected if data not written. We treat absence as a
      # failure so the check ends in failure rather than silently approving.
      - name: Read agent metrics
        id: metrics
        env:
          METRICS_PATH: ${{ runner.temp }}/review-metrics.yaml
        run: |
          set -euo pipefail
          if [ ! -f "$METRICS_PATH" ]; then
            # Look for json variant too.
            json_path="${METRICS_PATH%.yaml}.json"
            if [ -f "$json_path" ]; then
              METRICS_PATH="$json_path"
            else
              echo "::warning::No metrics file at $METRICS_PATH or $json_path"
              echo "verdict=unknown" >> "$GITHUB_OUTPUT"
              echo "follow_ups=0" >> "$GITHUB_OUTPUT"
              echo "missing=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          verdict=$(grep -E '^verdict:' "$METRICS_PATH" | sed 's/^verdict:[[:space:]]*//' | tr -d '"' || echo unknown)
          follow_ups=$(grep -E '^follow_ups:' "$METRICS_PATH" | sed 's/^follow_ups:[[:space:]]*//' || echo 0)
          echo "verdict=${verdict:-unknown}" >> "$GITHUB_OUTPUT"
          echo "follow_ups=${follow_ups:-0}" >> "$GITHUB_OUTPUT"
          echo "missing=false" >> "$GITHUB_OUTPUT"

      # Map verdict → check_run conclusion.
      - name: Compute check conclusion
        id: conclusion
        env:
          VERDICT: ${{ steps.metrics.outputs.verdict }}
          FOLLOW_UPS: ${{ steps.metrics.outputs.follow_ups }}
          MISSING: ${{ steps.metrics.outputs.missing }}
        run: |
          set -euo pipefail
          if [ "$MISSING" = "true" ]; then
            echo "conclusion=failure" >> "$GITHUB_OUTPUT"
            echo "title=Review agent finished but metrics missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$VERDICT" in
            APPROVE|approve)
              echo "conclusion=success" >> "$GITHUB_OUTPUT"
              echo "title=The agent approved this PR. $FOLLOW_UPS follow-ups found." >> "$GITHUB_OUTPUT"
              ;;
            REQUEST_CHANGES|request_changes|reject)
              echo "conclusion=failure" >> "$GITHUB_OUTPUT"
              echo "title=The agent rejected this PR. $FOLLOW_UPS follow-ups found." >> "$GITHUB_OUTPUT"
              ;;
            COMMENT|comment|*)
              echo "conclusion=neutral" >> "$GITHUB_OUTPUT"
              echo "title=The agent finished. $FOLLOW_UPS follow-ups found." >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Update check (terminal)
        if: success()
        uses: LouisBrunner/checks-action@v3.1.0
        with:
          token: ${{ steps.auth.outputs.token }}
          repo: ${{ inputs.source-repo }}
          check_id: ${{ inputs.check-run-id }}
          status: completed
          conclusion: ${{ steps.conclusion.outputs.conclusion }}
          details_url: ${{ steps.ctx.outputs.details_url }}
          output: |
            {"title":"${{ steps.conclusion.outputs.title }}","summary":"Review posted as PR review. See agent's review for findings."}

      # if: failure() guard — covers any earlier failure (token, dismissal,
      # run-agent crash, metrics-read error). Posts the safety-net check.
      - name: Update check (agent failed)
        if: failure()
        uses: LouisBrunner/checks-action@v3.1.0
        with:
          token: ${{ steps.auth.outputs.token }}
          repo: ${{ inputs.source-repo }}
          check_id: ${{ inputs.check-run-id }}
          status: completed
          conclusion: failure
          details_url: ${{ steps.ctx.outputs.details_url }}
          output: |
            {"title":"The review agent failed to run","summary":"See workflow run for details."}
