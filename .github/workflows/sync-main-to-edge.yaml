name: Sync main to edge

on:
  push:
    branches: [main]
  schedule:
    # Nightly safety net at 06:00 UTC. Catches any edge branches that
    # fell behind without a corresponding main push.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode (no push)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    name: Sync main -> */edge
    uses: nsheaps/github-actions/.github/workflows/sync-main-to-edge.yaml@main
    with:
      test_mode: ${{ inputs.test_mode == true }}
