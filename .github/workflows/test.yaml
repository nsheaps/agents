name: Test

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  # On push to main, share concurrency group with CD (auto-version-bump in cd.yaml)
  # to prevent races where both CI (lint auto-fix) and CD (version bump) try to push
  # commits simultaneously. On PRs, use a separate group.
  group: ${{ github.ref == 'refs/heads/main' && 'ci-cd-main' || format('ci-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Validate plugin structure
        uses: ./.github/actions/validate-plugins

  lint:
    runs-on: ubuntu-latest
    # Shares concurrency group with CD auto-version-bump to prevent
    # concurrent pushes to the same PR branch. See cd.yaml for details.
    concurrency:
      group: pr-autofix-${{ github.head_ref || github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout and authenticate as GitHub App
        id: auth
        uses: nsheaps/github-actions/.github/actions/checkout-as-app@603052841cd49b9fdc99bc32979ff9c45c9b669e # checkout-as-app@main
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}
          ref: ${{ github.head_ref || github.ref }}

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: ${{ github.event_name == 'pull_request' }}

      - name: Install bun deps
        run: bun install --frozen-lockfile

      - name: mise run lint (auto-fix mode)
        id: lint
        uses: ./.github/actions/lint-files
        with:
          fix: 'true'
        continue-on-error: true

      - name: git push (auto-commit lint fixes)
        if: steps.lint.outputs.changed-or-failed == 'true' && ! cancelled()
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: `mise run lint`'
          commit_user_name: ${{ steps.auth.outputs.user-name }}
          commit_user_email: ${{ steps.auth.outputs.user-email }}

      - name: 'exit 1 # changes detected or linting failed'
        if: ${{ steps.lint.outputs.changed-or-failed == 'true' && ! cancelled() }}
        run: |
          echo "Changes made or lint failed! Auto-committed the fixes, but more lint and format issues may remain."
          exit 1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: mise run test
