name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Validate plugin structure
        uses: ./.github/actions/validate-plugins

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts
        run: |
          for script in bin/*; do
            [ -d "$script" ] && continue
            [ -f "$script" ] || continue
            # Skip non-shell files (TypeScript, JavaScript, Python, etc.)
            case "$script" in
              *.ts|*.js|*.py|*.rb|*.go) continue ;;
            esac
            echo "Checking $script..."
            bash -n "$script"
          done
          for lib in bin/lib/*.sh; do
            [ -f "$lib" ] || continue
            echo "Checking $lib..."
            bash -n "$lib"
          done

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: mise run format-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: mise run test
