name: cd

'on':
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
      - '.github/workflows/cd.yaml'
      # Ignore version/marketplace files to prevent bump loops
      - '!plugins/claude-code/*/.claude-plugin/plugin.json'
      - '!.claude-plugin/marketplace.json'
  pull_request:
    paths:
      - 'plugins/**'
      - '.github/workflows/cd.yaml'
      # Ignore version/marketplace files to prevent bump loops
      - '!plugins/claude-code/*/.claude-plugin/plugin.json'
      - '!.claude-plugin/marketplace.json'
  workflow_dispatch:
    inputs:
      from_sha:
        description: 'commit sha from...HEAD to determine what to bump (overrides tag-based detection)'
        required: false
        default: ''
        type: string

concurrency:
  # On push to main, share concurrency group with CI to prevent races where
  # both CI (lint auto-fix) and CD (version bump) try to push commits
  # simultaneously. On PRs, use a separate group since CD only previews.
  group: ${{ github.ref == 'refs/heads/main' && 'ci-cd-main' || format('cd-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  AUTO_BUMP_COMMIT_MSG: 'chore: auto-bump plugin versions and update marketplace'

jobs:
  # For PRs: Auto-bump versions and update marketplace in the PR branch.
  # Pushes changes back to the PR branch (like lint auto-fix).
  # Does NOT use [skip ci] so CI re-runs to validate the final state.
  # Loop prevention: skips if latest commit is from a previous auto-bump.
  auto-version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    concurrency:
      group: pr-autofix-${{ github.head_ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Check if latest commit is auto-bump (loop prevention)
        id: check-skip
        run: |
          LAST_MSG=$(git log -1 --format='%s')
          if [[ "$LAST_MSG" == "$AUTO_BUMP_COMMIT_MSG" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Latest commit is from auto-bump, skipping to prevent loop"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch base branch and tags
        if: steps.check-skip.outputs.skip != 'true'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF":refs/remotes/origin/"$BASE_REF"
          git fetch origin --tags

      - name: Setup mise
        if: steps.check-skip.outputs.skip != 'true'
        uses: jdx/mise-action@v4

      - name: Install dependencies
        if: steps.check-skip.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Auto-bump changed plugins and update marketplace
        if: steps.check-skip.outputs.skip != 'true'
        id: bump
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # For PRs, always diff against the base branch to detect only THIS PR's changes.
          CHANGE_BASE="origin/$BASE_REF"
          OUTPUT=$(mise run auto-bump-plugins "--change-base=$CHANGE_BASE" "--version-base=$CHANGE_BASE")

          # Always regenerate marketplace (idempotent, picks up new plugins too)
          mise run update-marketplace

          # Lint/format everything
          mise run format 2>/dev/null || true

          # Check if any files changed
          if [ -n "$(git status --porcelain)" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
          fi

          # Save report for PR comment
          {
            echo "report-md<<REPORT_MD_EOF"
            echo "$OUTPUT" | jq -r '.report_md'
            echo "REPORT_MD_EOF"
          } >> $GITHUB_OUTPUT

      - name: Commit and push all changes at once
        if: steps.check-skip.outputs.skip != 'true' && steps.bump.outputs.has-changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ env.AUTO_BUMP_COMMIT_MSG }}
          commit_user_name: ${{ steps.auth.outputs.user-name }}
          commit_user_email: ${{ steps.auth.outputs.user-id }}+${{ steps.auth.outputs.user-name }}@users.noreply.github.com

      - name: Post version status comment
        if: steps.check-skip.outputs.skip != 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: 'plugin-versions'
          message: |
            ### Plugin Version Status
            _Versions are auto-bumped in PRs. Manual bumps to higher versions are preserved._

            ${{ steps.bump.outputs.report-md }}

  # For main: Bump only plugins that weren't already bumped in the PR,
  # then update marketplace metadata.
  bump-and-update-marketplace:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    concurrency:
      group: cd-main
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Resolve base ref from release tag
        id: resolve-base
        env:
          FROM_SHA: ${{ inputs.from_sha }}
        run: |
          TAG_NAME="cd/last-release"
          git fetch origin --tags
          # workflow_dispatch with explicit from_sha takes priority
          if [ -n "$FROM_SHA" ]; then
            echo "base-ref=$FROM_SHA" >> $GITHUB_OUTPUT
            echo "Using workflow_dispatch override: $FROM_SHA"
          elif git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "base-ref=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "Using release tag '$TAG_NAME' ($(git rev-parse --short $TAG_NAME)) as base ref"
          else
            echo "base-ref=HEAD~1" >> $GITHUB_OUTPUT
            echo "Release tag '$TAG_NAME' not found, falling back to HEAD~1"
          fi

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Auto-bump changed plugins (skip already bumped)
        id: bump
        shell: bash
        env:
          BASE_REF: ${{ steps.resolve-base.outputs.base-ref }}
        run: |
          # On main, use the same ref for both change detection and version comparison
          OUTPUT=$(mise run auto-bump-plugins "--change-base=$BASE_REF" "--version-base=$BASE_REF")
          echo "has-bumps=$(echo "$OUTPUT" | jq -r '.has_bumps')" >> $GITHUB_OUTPUT

      - name: Format after version bump
        if: steps.bump.outputs.has-bumps == 'true'
        run: mise run format 2>/dev/null || true

      - name: Commit version bumps
        if: steps.bump.outputs.has-bumps == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: bump plugin versions [skip ci]'
          commit_user_name: ${{ steps.auth.outputs.user-name }}
          commit_user_email: ${{ steps.auth.outputs.user-id }}+${{ steps.auth.outputs.user-name }}@users.noreply.github.com
          file_pattern: 'plugins/claude-code/*/.claude-plugin/plugin.json'
          push_options: '--no-verify'
          skip_push: true

      - name: Update marketplace metadata
        run: mise run update-marketplace

      - name: Format after marketplace update
        run: mise run format 2>/dev/null || true

      - name: Commit marketplace changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update marketplace metadata [skip ci]'
          commit_user_name: ${{ steps.auth.outputs.user-name }}
          commit_user_email: ${{ steps.auth.outputs.user-id }}+${{ steps.auth.outputs.user-name }}@users.noreply.github.com
          file_pattern: '.claude-plugin/marketplace.json'
          push_options: '--no-verify'
          skip_push: true

      - name: Push all changes
        run: |
          # Push if there are any unpushed commits (version bumps OR marketplace updates)
          if [ "$(git rev-list origin/main..HEAD 2>/dev/null | wc -l)" -gt 0 ]; then
            git push
          else
            echo "No unpushed commits, skipping push"
          fi

      - name: Update release tag
        run: |
          TAG_NAME="cd/last-release"
          git tag -f "$TAG_NAME" HEAD
          git push origin "$TAG_NAME" --force
          echo "Moved tag '$TAG_NAME' to $(git rev-parse --short HEAD)"
