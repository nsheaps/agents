name: cd

'on':
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
      - '.github/workflows/cd.yaml'
      # Ignore version/marketplace files to prevent bump loops
      - '!plugins/claude-code/*/.claude-plugin/plugin.json'
      - '!.claude-plugin/marketplace.json'
  pull_request:
    paths:
      - 'plugins/**'
      - '.github/workflows/cd.yaml'
      # Ignore version/marketplace files to prevent bump loops
      - '!plugins/claude-code/*/.claude-plugin/plugin.json'
      - '!.claude-plugin/marketplace.json'
  workflow_dispatch:
    inputs:
      from_sha:
        description: 'commit sha from...HEAD to determine what to bump (overrides tag-based detection)'
        required: false
        default: ''
        type: string

concurrency:
  # On push to main, share concurrency group with CI to prevent races where
  # both CI (lint auto-fix) and CD (version bump) try to push commits
  # simultaneously. On PRs, use a separate group since CD only previews.
  group: ${{ github.ref == 'refs/heads/main' && 'ci-cd-main' || format('cd-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # For PRs: PREVIEW ONLY. Computes the version bumps + marketplace updates that
  # WILL happen on merge, but does NOT commit or push anything to the PR branch.
  # Bumping versions and regenerating the shared marketplace.json inside PR
  # branches caused constant cross-PR merge conflicts; the real bump now happens
  # exactly once on merge to main (see bump-and-update-marketplace below).
  # The preview surfaces two ways:
  #   1. A sticky PR comment with the version table.
  #   2. ::notice annotations on each affected plugin.json showing the pending bump.
  # The bump runs in the working tree only to compute next versions; nothing is
  # committed, so the working tree is discarded when the job ends.
  version-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Fetch base branch and tags
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF":refs/remotes/origin/"$BASE_REF"
          git fetch origin --tags

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compute version bump preview
        id: bump
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Diff against the PR base branch so only THIS PR's changes are detected.
          OUTPUT=$(mise run auto-bump-plugins "--change-base=origin/$BASE_REF" "--version-base=origin/$BASE_REF")

          echo "bumps=$(echo "$OUTPUT" | jq -c '.bumps')" >> "$GITHUB_OUTPUT"

          {
            echo "report-md<<REPORT_MD_EOF"
            echo "$OUTPUT" | jq -r '.report_md'
            echo "REPORT_MD_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Annotate plugin.json files with pending version bump
        if: steps.bump.outputs.bumps != '' && steps.bump.outputs.bumps != '[]'
        env:
          BUMPS: ${{ steps.bump.outputs.bumps }}
        run: |
          echo "$BUMPS" | jq -c '.[]' | while read -r row; do
            name=$(echo "$row" | jq -r '.name')
            path=$(echo "$row" | jq -r '.path')
            base=$(echo "$row" | jq -r '.base')
            new=$(echo "$row" | jq -r '.new')
            action=$(echo "$row" | jq -r '.action')
            line=$(grep -nE '"version"[[:space:]]*:' "$path" | head -1 | cut -d: -f1)
            if [ "$action" = "already-bumped" ]; then
              detail="already bumped to ${new} in this PR (kept on merge to main)"
            else
              detail="${base} → ${new} will be applied automatically when this PR merges to main"
            fi
            echo "::notice file=${path},line=${line:-1},title=Pending version bump::${name}: ${detail}"
          done

      - name: Post version preview comment
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: 'plugin-versions'
          message: |
            ### Plugin Version Preview

            _Preview only — plugin versions and `marketplace.json` are bumped automatically on merge to `main`, **not** in this PR. Manual bumps to higher versions are preserved. See the file annotations for the pending change on each `plugin.json`._

            ${{ steps.bump.outputs.report-md }}

  # For main: the SOLE place bumps + marketplace updates are committed.
  # Auto-bumps each changed plugin (patch), preserving any manual bumps to a
  # higher version, then regenerates and commits marketplace metadata.
  bump-and-update-marketplace:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    concurrency:
      group: cd-main
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Resolve base ref from release tag
        id: resolve-base
        env:
          FROM_SHA: ${{ inputs.from_sha }}
        run: |
          TAG_NAME="cd/last-release"
          git fetch origin --tags
          # workflow_dispatch with explicit from_sha takes priority
          if [ -n "$FROM_SHA" ]; then
            echo "base-ref=$FROM_SHA" >> $GITHUB_OUTPUT
            echo "Using workflow_dispatch override: $FROM_SHA"
          elif git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "base-ref=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "Using release tag '$TAG_NAME' ($(git rev-parse --short $TAG_NAME)) as base ref"
          else
            echo "base-ref=HEAD~1" >> $GITHUB_OUTPUT
            echo "Release tag '$TAG_NAME' not found, falling back to HEAD~1"
          fi

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Auto-bump changed plugins (skip already bumped)
        id: bump
        shell: bash
        env:
          BASE_REF: ${{ steps.resolve-base.outputs.base-ref }}
        run: |
          # On main, use the same ref for both change detection and version comparison
          OUTPUT=$(mise run auto-bump-plugins "--change-base=$BASE_REF" "--version-base=$BASE_REF")
          echo "has-bumps=$(echo "$OUTPUT" | jq -r '.has_bumps')" >> $GITHUB_OUTPUT

      - name: Format after version bump
        if: steps.bump.outputs.has-bumps == 'true'
        run: mise run format 2>/dev/null || true

      - name: Commit version bumps
        if: steps.bump.outputs.has-bumps == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: bump plugin versions [skip ci]'
          commit_user_name: ${{ steps.auth.outputs.user-name }}
          commit_user_email: ${{ steps.auth.outputs.user-id }}+${{ steps.auth.outputs.user-name }}@users.noreply.github.com
          file_pattern: 'plugins/claude-code/*/.claude-plugin/plugin.json'
          push_options: '--no-verify'
          skip_push: true

      - name: Update marketplace metadata
        run: mise run update-marketplace

      - name: Format after marketplace update
        run: mise run format 2>/dev/null || true

      - name: Commit marketplace changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update marketplace metadata [skip ci]'
          commit_user_name: ${{ steps.auth.outputs.user-name }}
          commit_user_email: ${{ steps.auth.outputs.user-id }}+${{ steps.auth.outputs.user-name }}@users.noreply.github.com
          file_pattern: '.claude-plugin/marketplace.json'
          push_options: '--no-verify'
          skip_push: true

      - name: Push all changes
        run: |
          # Push if there are any unpushed commits (version bumps OR marketplace updates)
          if [ "$(git rev-list origin/main..HEAD 2>/dev/null | wc -l)" -gt 0 ]; then
            git push
          else
            echo "No unpushed commits, skipping push"
          fi

      - name: Update release tag
        run: |
          TAG_NAME="cd/last-release"
          git tag -f "$TAG_NAME" HEAD
          git push origin "$TAG_NAME" --force
          echo "Moved tag '$TAG_NAME' to $(git rev-parse --short HEAD)"
