name: PR Status Digest

# DISABLED 2026-05-28 (GSD-101): docs/pr-status/ moved to nsheaps/.org. This
# workflow needs to be reworked to push cross-repo (or migrated entirely to
# .org). Until that lands, the schedule/dispatch triggers are inert (gated by
# `if: false`) so we don't write to a path that's about to be deleted from
# this repo. Tracking: https://github.com/nsheaps/.org/blob/main/docs/project-tracking/projects/GSD/tickets/GSD-101-move-tickets-pr-digests-to-nsheaps-org.md
#
# Generates emoji-bucketed PR-status digests for every repo in REPOS.md scope:
# one doc per repo at docs/pr-status/per-repo/<owner>--<repo>.md, plus one
# combined doc at docs/pr-status/all.md. Commits + pushes any changes back to
# main via the github-app-auth composite (no user PAT).
#
# Query efficiency: a SINGLE GraphQL search query (chunked only if the repo list
# exceeds ~230 chars of repo: qualifiers) discovers all open PRs across all repos
# in one round-trip. Results are bucketed locally into per-repo files.
# Before: N+1 queries (N per-repo + 1 combined) — After: 1 query (+ optional chunks).
#
# Triggers:
#   - schedule:           every 12h          → full regen
#   - workflow_dispatch:  manual via UI       → full regen
#   - repository_dispatch: cross-repo refresh → full regen
#   - pull_request:       PR state changes    → event-driven patch (no API calls)
#
# Source: GSD-76 / FXP-1.12.2 — Nate Discord 2026-05-28 03:56Z.
# Event-driven patch: FXP/SU.29 — Nate Discord 2026-05-28 20:22Z.

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [pr-status-refresh]
  pull_request:
    # State changes only — explicitly NOT `synchronize` (don't re-run on every push)
    types: [opened, closed, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: write

concurrency:
  group: pr-status-digest-update
  cancel-in-progress: false

jobs:
  # ── Event-driven patch ────────────────────────────────────────────────────
  # Runs ONLY on pull_request events. Reads the event payload directly (no
  # extra API calls), patches the single PR line in the existing digest files,
  # and commits if anything changed.
  patch:
    runs-on: ubuntu-latest
    # GSD-101: disabled until rework targets nsheaps/.org cross-repo.
    if: false && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Setup mise (bun)
        uses: jdx/mise-action@v4

      - name: Patch digest from PR event payload
        run: |
          set -euo pipefail
          CLI="apps/pr-status-cli/src/index.ts"
          bun run "$CLI" patch-event \
            --event-file "$GITHUB_EVENT_PATH" \
            --digest-dir  docs/pr-status

      - name: Configure git identity (github-app bot)
        env:
          BOT_USER_ID: ${{ steps.auth.outputs.user-id }}
          BOT_USER_NAME: ${{ steps.auth.outputs.user-name }}
        run: |
          git config user.name  "$BOT_USER_NAME"
          git config user.email "${BOT_USER_ID}+${BOT_USER_NAME}@users.noreply.github.com"

      - name: Commit + push if changed
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          PR_REPO: ${{ github.event.repository.full_name }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail
          # patch-event seeds the dir when missing; guard in case it was a no-op
          if [[ ! -d docs/pr-status ]]; then
            echo "No digest changes — docs/pr-status/ not created, nothing to commit."
            exit 0
          fi
          git add docs/pr-status/
          if git diff --cached --quiet; then
            echo "No digest changes — nothing to commit."
            exit 0
          fi
          git commit -m "chore(pr-status): patch ${PR_REPO}#${PR_NUM} (${PR_ACTION})"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # Push with rebase-retry: if push fails (someone else pushed to main
          # between our checkout and now), pull --rebase and try again.
          pushed=false
          for attempt in 1 2; do
            if git push origin HEAD:main; then
              pushed=true
              break
            fi
            echo "::warning::push attempt $attempt failed; pulling --rebase and retrying"
            git pull --rebase origin main || true
          done
          if [[ "$pushed" != "true" ]]; then
            echo "::error::push failed after rebase retry"
            exit 1
          fi

  # ── Full regeneration ─────────────────────────────────────────────────────
  # Runs on schedule, workflow_dispatch, and repository_dispatch (not on
  # pull_request — those are handled by the patch job above).
  digest:
    runs-on: ubuntu-latest
    # GSD-101: disabled until rework targets nsheaps/.org cross-repo.
    if: false && github.event_name != 'pull_request'
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Setup mise (bun)
        uses: jdx/mise-action@v4

      - name: Resolve scope from REPOS.md
        id: scope
        run: |
          set -euo pipefail
          mapfile -t SLUGS < <(scripts/parse-repos-md.sh REPOS.md)
          if [[ ${#SLUGS[@]} -eq 0 ]]; then
            echo "::error::No slugs parsed from REPOS.md — refusing to proceed (would corrupt docs/pr-status/ with empty output)."
            exit 1
          fi
          echo "Found ${#SLUGS[@]} repo slugs in REPOS.md scope:"
          printf '  - %s\n' "${SLUGS[@]}"
          # Persist for later steps (newline-separated; multiline outputs are fine)
          {
            echo "slugs<<EOF"
            printf '%s\n' "${SLUGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate per-repo digests + combined
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/pr-status/per-repo
          CLI="apps/pr-status-cli/src/index.ts"
          TS=$(date -u +%Y-%m-%dT%H:%MZ)

          # Build --repo flag list from resolved scope
          REPO_ARGS=()
          while IFS= read -r slug; do
            [[ -z "$slug" ]] && continue
            REPO_ARGS+=(--repo "$slug")
          done <<< "${{ steps.scope.outputs.slugs }}"

          # --- single query → per-repo files + combined stdout ---
          # --out-dir writes one file per repo inside docs/pr-status/per-repo/.
          # stdout contains ALL lines (combined); we also pipe to the all.md file.
          # The CLI automatically chunks repo: qualifiers if they exceed ~230 chars.
          # GITHUB_STEP_SUMMARY is set so the CLI also appends a per-repo summary table.
          echo "::group::digest (single query, ${#REPO_ARGS[@]} --repo flags)"
          {
            echo "# PR Status — REPOS.md scope (combined)"
            echo
            echo "_Generated $TS · scope: ${#REPO_ARGS[@]} repo flags · open + merged 🟣 only (closed-no-merge ❌ excluded)._"
            echo
            bun run "$CLI" digest "${REPO_ARGS[@]}" --state=all --since=all --limit=2000 \
              --out-dir docs/pr-status/per-repo 2>&1 \
              | { grep -vE '^digest query:|^discovered |^summary:' || true; } \
              | { grep -vE '~~.*❌' || true; }
          } > docs/pr-status/all.md
          echo "::endgroup::"

      - name: Configure git identity (github-app bot)
        env:
          BOT_USER_ID: ${{ steps.auth.outputs.user-id }}
          BOT_USER_NAME: ${{ steps.auth.outputs.user-name }}
        run: |
          git config user.name  "$BOT_USER_NAME"
          git config user.email "${BOT_USER_ID}+${BOT_USER_NAME}@users.noreply.github.com"

      - name: Commit + push if changed
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          TRIGGER: ${{ github.event_name }}
        run: |
          set -euo pipefail
          git add docs/pr-status/
          if git diff --cached --quiet; then
            echo "No digest changes — nothing to commit."
            exit 0
          fi
          git commit -m "chore(pr-status): regenerate REPOS.md digest (trigger: ${TRIGGER})"
          # Set remote URL with token in git config (kept out of the command string)
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # Push with rebase-retry: if push fails (someone else pushed to main
          # between our checkout and now), pull --rebase and try again.
          pushed=false
          for attempt in 1 2; do
            if git push origin HEAD:main; then
              pushed=true
              break
            fi
            echo "::warning::push attempt $attempt failed; pulling --rebase and retrying"
            git pull --rebase origin main || true
          done
          if [[ "$pushed" != "true" ]]; then
            echo "::error::push failed after rebase retry"
            exit 1
          fi

      - name: Upload digest artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-status-digests
          path: docs/pr-status/
          retention-days: 5
