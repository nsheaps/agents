name: PR Status Digest Retry

# On failure of "PR Status Digest", re-run the failed jobs ONCE.
# GitHub's run.run_attempt counter starts at 1 for the original run and
# increments on each re-run, so we gate on attempt == 1 to ensure at most
# one retry per original trigger (no infinite loop).
#
# Source: Nate Discord 2026-05-28 20:39Z — "one more retry of the whole
# workflow on failure".

on:
  workflow_run:
    workflows: ["PR Status Digest"]
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  retry:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1
    steps:
      - name: Re-run failed jobs of the digest workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Re-running failed jobs of run $RUN_ID (attempt 1 → 2)"
          gh run rerun "$RUN_ID" --repo "$REPO" --failed
