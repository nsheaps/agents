name: Review Dispatch (reusable)

# Reusable decider workflow. Posts a pending check on the consumer PR head
# SHA, then fires a repository_dispatch to the target agent repo. The
# target's `dispatch-receiver-review.yaml` picks up the dispatch and runs
# the review under the target agent's identity.
#
# Spec: plugins/claude-code/review-utils/specs/review-dispatch.md
#
# 2026-05-23 redesign (Nate 18:08Z): the CI-settled gate evaluation is
# REMOVED from the decider. The gate now lives at the consumer template
# level via job-level `if:` conditions ("PR is open and labelled" / "PR
# was just converted_to_draft + still labelled" / etc.). This decider
# always dispatches when invoked — its only jobs are (1) post pending
# check, (2) fire dispatch. The decider also DOES NOT remove the trigger
# label — the label stays so subsequent PR events keep re-firing the
# dispatch.

on:
  workflow_call:
    inputs:
      target-repo:
        description: 'Target agent repo that runs the review (owner/name).'
        required: false
        default: 'nsheaps/.ai-agent-henry'
        type: string
    # Gate uses automation-nsheaps[bot] creds — routing only (check_run
    # post, repository_dispatch fire). Reviewer identity
    # (REVIEW_GITHUB_APP_*) lives on the receiver side where the review
    # actually executes under the target agent's App. See
    # plugins/claude-code/review-utils/specs/review-dispatch.md §Secrets.
    secrets:
      AUTOMATION_GITHUB_APP_ID:
        required: true
      AUTOMATION_GITHUB_APP_PRIVATE_KEY:
        required: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    concurrency:
      group: review-dispatch-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Build details_url
        id: ctx
        run: echo "details_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Generate automation App token
        id: auth
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # Post the pending check before dispatching. The receiver will
      # update this same check_run_id through in_progress → terminal.
      - name: Post pending check
        id: check-queued
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ steps.auth.outputs.token }}
          repo: ${{ github.repository }}
          sha: ${{ github.event.pull_request.head.sha }}
          name: AI Code Review
          status: queued
          details_url: ${{ steps.ctx.outputs.details_url }}
          output: |
            {"title":"Dispatching review agent","summary":"Forwarding to ${{ inputs.target-repo }}..."}

      # Fire repository_dispatch to the target agent repo. The target's
      # `dispatch-receiver-review.yaml` picks it up and runs the review.
      - name: Fire repository_dispatch to target
        id: dispatch
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ steps.auth.outputs.token }}
          repository: ${{ inputs.target-repo }}
          client-payload: |
            {
              "source": {
                "repo": "${{ github.repository }}",
                "pr_number": ${{ github.event.pull_request.number }},
                "head_sha": "${{ github.event.pull_request.head.sha }}",
                "head_ref": "${{ github.event.pull_request.head.ref }}",
                "base_ref": "${{ github.event.pull_request.base.ref }}"
              },
              "check_run_id": "${{ steps.check-queued.outputs.check_id }}",
              "consumer_workflow_run_url": "${{ steps.ctx.outputs.details_url }}",
              "trigger": {
                "event": "${{ github.event_name }}",
                "action": "${{ github.event.action }}"
              }
            }

      - name: Update check (dispatched)
        if: success()
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ steps.auth.outputs.token }}
          repo: ${{ github.repository }}
          check_id: ${{ steps.check-queued.outputs.check_id }}
          status: queued
          details_url: ${{ steps.ctx.outputs.details_url }}
          output: |
            {"title":"Review agent dispatched","summary":"Waiting for ${{ inputs.target-repo }} to start the review."}

      # if: failure() guard — covers token-gen / check-post / dispatch fire failures.
      - name: Update check (dispatch failed)
        if: failure() && steps.check-queued.outputs.check_id != ''
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        with:
          token: ${{ steps.auth.outputs.token }}
          repo: ${{ github.repository }}
          check_id: ${{ steps.check-queued.outputs.check_id }}
          status: completed
          conclusion: failure
          details_url: ${{ steps.ctx.outputs.details_url }}
          output: |
            {"title":"Failed to dispatch review agent","summary":"See workflow run for details."}
