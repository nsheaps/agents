name: Release

# Affected-driven release. Each releasable module owns a self-contained `release` target
# (nx run-script): root → release-it (GitHub release + Homebrew formula update); plugins →
# version bump + marketplace.json regen. We compute which modules changed since the floating
# `last-released` tag and run only those via `nx affected --target=release`. This is what
# stops a plugins-only change from cutting an agent-team GitHub release + Homebrew PR (the
# Homebrew formula ships only bin/** scripts, which a plugins change never touches).
#
# On success the `last-released` tag is moved to the released commit so the next run diffs
# from here.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_override:
        description: 'Override the affected base ref (default: last-released tag, fallback HEAD~1)'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.affected.outputs.projects }}
      released: ${{ steps.release-info.outputs.released }}
      version: ${{ steps.release-info.outputs.version }}
      tag: ${{ steps.release-info.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Fetch tags
        run: git fetch origin --tags --force

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Base for affected detection: the floating last-released tag. workflow_dispatch can
      # override it; first run (tag absent) falls back to HEAD~1.
      - name: Resolve affected base
        id: base
        env:
          OVERRIDE: ${{ inputs.base_override }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            BASE="$OVERRIDE"
            echo "Using workflow_dispatch override: $BASE"
          elif git rev-parse --verify --quiet last-released >/dev/null; then
            BASE="last-released"
            echo "Using 'last-released' tag ($(git rev-parse --short last-released)) as base"
          else
            BASE="HEAD~1"
            echo "'last-released' tag not found, falling back to HEAD~1"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      # Only projects that (a) define a release target AND (b) are affected since BASE.
      - name: Compute affected release projects
        id: affected
        env:
          BASE: ${{ steps.base.outputs.base }}
        run: |
          PROJECTS=$(bunx nx show projects --affected --withTarget=release --base="$BASE" --head=HEAD --json)
          echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"
          if echo "$PROJECTS" | jq -e 'index("root")' >/dev/null; then
            echo "root=true" >> "$GITHUB_OUTPUT"
          else
            echo "root=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Affected release projects: $PROJECTS"

      # Record the latest v* tag BEFORE releasing, so we can tell whether the root release
      # actually cut a new version (release-it is a no-op when no version-worthy commits exist).
      - name: Record pre-release tag
        id: pre
        run: echo "tag=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo none)" >> "$GITHUB_OUTPUT"

      # Release affected modules via their own nx `release` target. Order matters: root's
      # release-it pushes a commit to main and CANNOT tolerate main advancing under it,
      # whereas every other module's release script resyncs to origin/main and retries. So
      # release root FIRST (when affected), then the resilient rest. nx still runs each
      # module's build/test/lint (and ^release) first per the release dependsOn.
      - name: Run affected releases
        if: steps.affected.outputs.projects != '[]'
        env:
          BASE: ${{ steps.base.outputs.base }}
          RELEASE_BASE: ${{ steps.base.outputs.base }}
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          if [ "${{ steps.affected.outputs.root }}" = "true" ]; then
            bunx nx run root:release
          fi
          bunx nx affected --target=release --base="$BASE" --head=HEAD --exclude=root --parallel=1

      # Surface root's release for the Homebrew job — but only when release-it actually cut a
      # NEW v* tag. A root-affected change that produces no version bump (e.g. a docs-only
      # change) must not open a no-op Homebrew PR against the unchanged version.
      - name: Resolve root release info
        id: release-info
        if: steps.affected.outputs.root == 'true'
        env:
          PRE_TAG: ${{ steps.pre.outputs.tag }}
        run: |
          git fetch origin --tags --force
          TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo none)
          if [ "$TAG" != "none" ] && [ "$TAG" != "$PRE_TAG" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "Released root version $TAG (was $PRE_TAG)"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "root affected but release-it produced no new version (still $TAG); skipping Homebrew"
          fi

      # Reached only when every prior step succeeded. Mark the released commit so the next
      # run diffs from here. Point at origin/main (the release scripts pushed new commits).
      - name: Move last-released tag
        run: |
          git fetch origin main --force
          git tag -f last-released origin/main
          git push origin last-released --force
          echo "Moved 'last-released' to $(git rev-parse --short origin/main)"

  update-homebrew:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Get job context
        id: context
        uses: qoomon/actions--context@v5

      - name: Authenticate as GitHub App
        id: auth
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Get release info
        id: release
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          TAG="${{ needs.release.outputs.tag }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Download archive tarball and calculate SHA256
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          echo "Downloading tarball from: $TARBALL_URL"
          curl -fsSL "$TARBALL_URL" -o /tmp/archive.tar.gz
          SHA256=$(sha256sum /tmp/archive.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Successfully got SHA256: $SHA256"

      - name: Clone homebrew-devsetup
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          gh repo clone nsheaps/homebrew-devsetup homebrew-devsetup

      - name: Install gomplate
        run: |
          GOMPLATE_VERSION="v4.3.0"
          GOMPLATE_SHA256="8adb82e5be7dfde49857ebd7c948fd8f9b10cdcdb13f71b74685dff6e6756890"
          curl -fsSL "https://github.com/hairyhenderson/gomplate/releases/download/${GOMPLATE_VERSION}/gomplate_linux-amd64" -o /usr/local/bin/gomplate
          echo "$GOMPLATE_SHA256  /usr/local/bin/gomplate" | sha256sum -c
          chmod +x /usr/local/bin/gomplate

      - name: Generate formulas from templates
        env:
          Tag: ${{ steps.release.outputs.tag }}
          SHA256: ${{ steps.release.outputs.sha256 }}
        run: |
          gomplate -f Formula/agent-team.rb.gotmpl -o homebrew-devsetup/Formula/agent-team.rb
          gomplate -f Formula/claude-team.rb.gotmpl -o homebrew-devsetup/Formula/claude-team.rb

      - name: Close stale formula PRs
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cd homebrew-devsetup
          # Close any open PRs from previous formula updates — they're superseded
          # Convention dependency: PR title prefix must match "chore: update agent-team claude-team to"
          stale_prs=$(gh pr list --state open --search "chore: update agent-team claude-team to" --json number --jq '.[].number' || true)
          for pr_num in $stale_prs; do
            echo "Closing superseded PR #${pr_num}"
            gh pr close "$pr_num" --comment "Superseded by v${{ steps.release.outputs.version }} update."
          done

      - name: Create PR to update formula
        id: formula-pr
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.release.outputs.tag }}
          JOB_URL: ${{ steps.context.outputs.job_url }}
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          cd homebrew-devsetup
          BRANCH="bump-agent-team-claude-team-${VERSION}"

          # Delete remote branch if it exists from a previous failed run
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add Formula/agent-team.rb Formula/claude-team.rb
          git commit -m "chore: update agent-team claude-team to ${VERSION}"
          git push -u origin "$BRANCH"

          {
            printf 'Automated formula update from agent-team release\n\n'
            printf '**Release:** %s\n' "${RELEASE_URL}"
            printf '**Workflow:** %s\n' "${JOB_URL}"
          } > /tmp/pr-body.md

          PR_URL=$(gh pr create \
            --title "chore: update agent-team claude-team to ${VERSION}" \
            --body-file /tmp/pr-body.md \
            --base main)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge with retry
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
          PR_URL: ${{ steps.formula-pr.outputs.pr_url }}
        run: |
          # Retry auto-merge — CI checks on the target repo need time to start,
          # and the GraphQL API rejects enablePullRequestAutoMerge while the PR
          # is in "unstable" (checks pending) status.
          for attempt in 1 2 3 4 5; do
            if gh pr merge "$PR_URL" --auto --squash; then
              echo "Auto-merge enabled successfully on attempt ${attempt}"
              exit 0
            fi
            wait=$((attempt * 10))
            echo "Auto-merge not ready (attempt ${attempt}/5), waiting ${wait}s..."
            sleep "$wait"
          done
          echo "::warning::Could not enable auto-merge after 5 attempts. PR was created successfully at ${PR_URL} — merge manually or re-run."
